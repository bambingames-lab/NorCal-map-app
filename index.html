<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NorCal Territory Manager</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
body,html{margin:0;height:100%;font-family:Arial}
#map{height:100%}
.menuBtn{position:absolute;top:10px;right:10px;z-index:1000;padding:10px;background:#fff;border-radius:10px}
.panel{position:absolute;top:10px;right:10px;width:260px;background:#fff;border-radius:12px;padding:12px;display:none;z-index:999}
.panel.open{display:block}
.closeBtn{float:left;background:#2563eb;color:#fff;border:none;padding:6px 10px;border-radius:8px}
button{margin-top:6px;padding:10px;border:none;border-radius:8px;background:#2563eb;color:#fff}
.secondary{background:#eee;color:#000}
</style>
</head>
<body>

<button id="menuBtn" class="menuBtn">Menu</button>

<div id="panel" class="panel">
<button id="closeBtn" class="closeBtn">Close</button>
<h3>Controls</h3>

<button id="markToday">Mark Today</button>
<input type="date" id="date">
<button id="setDate" class="secondary">Set Date</button>
<button id="clearDate" style="background:#dc2626">Clear Date</button>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>

const map = L.map('map').setView([39,-121],7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let selected=null;
let data = JSON.parse(localStorage.getItem("zipData")||"{}");

function save(){localStorage.setItem("zipData",JSON.stringify(data))}

function popup(zip){
return `ZIP ${zip}<br>
Last: ${data[zip]||"none"}<br>
<button onclick="markToday()">Today</button>
<button onclick="clearZip()">Clear</button>`
}

window.markToday=()=>{
if(!selected)return;
data[selected]=new Date().toISOString().split("T")[0];
save();
map.closePopup();
}

window.clearZip=()=>{
if(!selected)return;
delete data[selected];
save();
map.closePopup();
}

fetch("https://raw.githubusercontent.com/OpenDataDE/State-zip-code-GeoJSON/master/ca_california_zip_codes_geo.min.json")
.then(r=>r.json())
.then(j=>{
L.geoJSON(j,{
onEachFeature:(f,l)=>{
const zip=f.properties.ZCTA5CE10;
l.on("click",()=>{
selected=zip;
l.bindPopup(popup(zip)).openPopup();
})
}
}).addTo(map)
});

document.getElementById("menuBtn").onclick=()=>{
document.getElementById("panel").classList.add("open");
document.getElementById("menuBtn").style.display="none";
}
document.getElementById("closeBtn").onclick=()=>{
document.getElementById("panel").classList.remove("open");
document.getElementById("menuBtn").style.display="block";
}

document.getElementById("markToday").onclick=()=>window.markToday();
document.getElementById("setDate").onclick=()=>{
if(!selected)return;
const d=document.getElementById("date").value;
if(!d)return;
data[selected]=d;
save();
}
document.getElementById("clearDate").onclick=()=>window.clearZip();

</script>

</body>
</html>
