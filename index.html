<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NorCal Territory Manager</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    html, body { margin:0; padding:0; height:100%; font-family: Arial, sans-serif; }
    #map { height:100vh; width:100vw; background:#eef2f7; }
    .menuBtn { position:absolute; top:12px; right:12px; z-index:1300; width:auto; padding:10px 14px; border:none; border-radius:12px; background:rgba(255,255,255,.96); box-shadow:0 10px 24px rgba(0,0,0,.16); font-weight:700; cursor:pointer; }
    .menuBtn.hidden { display:none; }
    .panel { position:absolute; top:12px; right:12px; z-index:1290; width:250px; max-width:calc(100vw - 24px); background:rgba(255,255,255,.97); border-radius:14px; box-shadow:0 10px 24px rgba(0,0,0,.18); border:1px solid #dbe4ef; display:none; max-height:calc(100vh - 24px); overflow-y:auto; }
    .panel.open { display:block; }
    .panel-header { position:sticky; top:0; z-index:2; display:flex; align-items:center; justify-content:space-between; gap:8px; background:rgba(255,255,255,.98); padding:12px 12px 8px; border-bottom:1px solid #eef2f7; border-top-left-radius:14px; border-top-right-radius:14px; }
    .closeBtn { width:auto; min-width:64px; padding:8px 10px; margin:0; background:#2563eb; color:#fff; border:none; border-radius:10px; font-size:12px; font-weight:700; cursor:pointer; flex:0 0 auto; order:-1; }
    .panel h1 { font-size:18px; margin:0; line-height:1.2; }
    .small { font-size:12px; color:#64748b; line-height:1.35; margin-bottom:10px; }
    .section { border:1px solid #e5e7eb; border-radius:12px; padding:10px; margin-top:10px; background:#fff; }
    .section-title { font-size:14px; font-weight:700; margin-bottom:8px; }
    label { display:block; font-size:12px; font-weight:700; margin:8px 0 4px; }
    input, select, button { width:100%; box-sizing:border-box; border-radius:10px; font-size:14px; }
    input, select { border:1px solid #d1d5db; padding:10px; background:#fff; }
    button { border:none; padding:10px 12px; background:#2563eb; color:#fff; font-weight:700; margin-top:8px; cursor:pointer; }
    button.secondary { background:#eef2ff; color:#111827; }
    button.danger { background:#dc2626; color:#fff; }
    .row { display:grid; grid-template-columns: 1fr auto; gap:8px; }
    .row button { width:auto; min-width:72px; margin-top:0; }
    .legend { display:grid; grid-template-columns:repeat(5, 1fr); height:14px; overflow:hidden; border-radius:999px; border:1px solid #d1d5db; margin-top:8px; }
    .legend div:nth-child(1){background:#b91c1c;}
    .legend div:nth-child(2){background:#ef4444;}
    .legend div:nth-child(3){background:#f59e0b;}
    .legend div:nth-child(4){background:#fde047;}
    .legend div:nth-child(5){background:#22c55e;}
    .legend-labels { display:flex; justify-content:space-between; font-size:11px; color:#64748b; margin-top:5px; }
    .stats { font-size:13px; line-height:1.45; background:#f8fafc; border:1px solid #e2e8f0; border-radius:10px; padding:10px; }
    .leaflet-popup-content button, .leaflet-popup-content input { width:100%; box-sizing:border-box; margin-top:6px; border-radius:8px; padding:8px; font-size:13px; }
    .leaflet-popup-content button { border:none; background:#2563eb; color:white; font-weight:700; cursor:pointer; }
    .leaflet-popup-content .secondary { background:#eef2ff; color:#111827; }
    .leaflet-popup-content .danger { background:#dc2626; color:#fff; }
  </style>
</head>
<body>
  <button id="menuBtn" class="menuBtn">Menu</button>
  <div id="panel" class="panel">
    <div class="panel-header">
      <button id="closeBtn" class="closeBtn">Close</button>
      <h1>NorCal Territory Manager</h1>
    </div>
    <div style="padding:12px;">
      <div class="small">This version adds clear-date actions in both the menu and ZIP popup.</div>

      <div class="section">
        <div class="section-title">Search ZIP</div>
        <div class="row">
          <input id="searchInput" placeholder="Try 95823 or 95926">
          <button id="searchBtn">Find</button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">ZIP appearance</div>
        <label for="zipFill">Unchecked ZIP fill</label>
        <select id="zipFill">
          <option value="none">Transparent</option>
          <option value="gray">Light gray</option>
        </select>
        <label for="zipWeight">ZIP line thickness</label>
        <input type="range" id="zipWeight" min="2" max="6" step="0.5" value="3.5">
        <button id="refreshZipBtn" class="secondary">Refresh ZIP lines from web</button>
      </div>

      <div class="section">
        <div class="section-title">Quick actions</div>
        <button id="markTodayBtn">Mark selected ZIP today</button>
        <input type="date" id="date">
        <button class="secondary" id="setDateBtn">Set selected ZIP date</button>
        <button class="danger" id="clearDateBtn">Clear selected ZIP date</button>
      </div>

      <div class="section">
        <div class="section-title">Legend</div>
        <div class="legend">
          <div></div><div></div><div></div><div></div><div></div>
        </div>
        <div class="legend-labels">
          <span>Recent</span>
          <span>~ 3 months</span>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Coverage</div>
        <div id="stats" class="stats">Loading…</div>
      </div>
    </div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const STORAGE_KEY = "norcal-zip-zone-manager-v1";
    const ZIP_URL = "https://raw.githubusercontent.com/OpenDataDE/State-zip-code-GeoJSON/master/ca_california_zip_codes_geo.min.json";
    const DB_NAME = "norcalZipZoneDB";
    const STORE_NAME = "cache";
    const SOUTH_LIMIT = 38.05;

    const map = L.map("map").setView([39.1, -121.4], 7);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
      settings: { zipFill: "none", zipWeight: 3.5 },
      zips: {}
    };

    let zipLayer = null;
    let selected = null;

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function weeksSince(dateStr) {
      if (!dateStr) return null;
      const then = new Date(dateStr + "T00:00:00");
      return Math.max(0, (Date.now() - then.getTime()) / (1000 * 60 * 60 * 24 * 7));
    }

    function zoneColor(dateStr) {
      if (!dateStr) return state.settings.zipFill === "gray" ? "#d1d5db" : "transparent";
      const w = weeksSince(dateStr);
      if (w < 2) return "#b91c1c";
      if (w < 5) return "#ef4444";
      if (w < 9) return "#f59e0b";
      if (w < 12) return "#fde047";
      return "#22c55e";
    }

    function zipCodeFromFeature(feature) {
      const p = feature.properties || {};
      return String(p.ZCTA5CE10 || p.ZCTA5CE20 || p.zip_code || p.ZIP_CODE || p.zip || p.name || "");
    }

    function zipStyle(feature) {
      const zip = zipCodeFromFeature(feature);
      const isSelected = selected === zip;
      const last = state.zips[zip];
      return {
        color: isSelected ? "#2563eb" : "#111827",
        weight: isSelected ? Number(state.settings.zipWeight || 3.5) + 1.5 : Number(state.settings.zipWeight || 3.5),
        opacity: 0.95,
        fillColor: zoneColor(last),
        fillOpacity: last ? 0.50 : (state.settings.zipFill === "gray" ? 0.12 : 0)
      };
    }

    function updateStats() {
      const tracked = Object.values(state.zips).filter(Boolean).length;
      const overdue = Object.values(state.zips).filter(v => {
        const w = weeksSince(v);
        return w !== null && w >= 12;
      }).length;

      const selectedText = selected
        ? `<strong>Selected ZIP:</strong> ${selected}<br><strong>Last visited:</strong> ${state.zips[selected] || "Not set"}`
        : "No ZIP selected yet.";

      document.getElementById("stats").innerHTML =
        selectedText +
        `<br><br><strong>ZIPs tracked:</strong> ${tracked}` +
        `<br><strong>Over 3 months:</strong> ${overdue}`;
    }

    function popupHtml(zip) {
      const last = state.zips[zip] || "Not set";
      return `
        <div style="min-width:180px">
          <strong>ZIP ${zip}</strong><br>
          Last visited: ${last}<br>
          <button onclick="popupMarkToday()">Mark Today</button>
          <button class="secondary" onclick="popupYesterday()">Mark Yesterday</button>
          <input type="date" id="popupDate">
          <button onclick="popupSaveDate()">Save Date</button>
          <button class="danger" onclick="popupClearDate()">Clear Date</button>
        </div>
      `;
    }

    function redrawZipLayer() {
      if (zipLayer) zipLayer.setStyle(zipStyle);
      updateStats();
      saveState();
    }

    window.popupMarkToday = function () {
      if (!selected) return;
      state.zips[selected] = new Date().toISOString().split("T")[0];
      redrawZipLayer();
      map.closePopup();
    };

    window.popupYesterday = function () {
      if (!selected) return;
      const d = new Date();
      d.setDate(d.getDate() - 1);
      state.zips[selected] = d.toISOString().split("T")[0];
      redrawZipLayer();
      map.closePopup();
    };

    window.popupSaveDate = function () {
      if (!selected) return;
      const val = document.getElementById("popupDate").value;
      if (!val) return;
      state.zips[selected] = val;
      redrawZipLayer();
      map.closePopup();
    };

    window.popupClearDate = function () {
      if (!selected) return;
      delete state.zips[selected];
      redrawZipLayer();
      map.closePopup();
    };

    function centerLat(feature) {
      const layer = L.geoJSON(feature);
      const b = layer.getBounds();
      return (b.getNorth() + b.getSouth()) / 2;
    }

    function filterNorth(data) {
      return {
        type: "FeatureCollection",
        features: (data.features || []).filter(f => {
          try { return centerLat(f) >= SOUTH_LIMIT; }
          catch { return false; }
        })
      };
    }

    function openDb() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, 1);
        request.onupgradeneeded = (event) => {
          const db = event.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME);
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function cachePut(key, value) {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readwrite");
        tx.objectStore(STORE_NAME).put(value, key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    async function cacheGet(key) {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readonly");
        const req = tx.objectStore(STORE_NAME).get(key);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function renderZipData(data) {
      if (zipLayer) map.removeLayer(zipLayer);
      zipLayer = L.geoJSON(data, {
        style: zipStyle,
        onEachFeature: (feature, layer) => {
          layer.on("click", () => {
            selected = zipCodeFromFeature(feature);
            redrawZipLayer();
            layer.bindPopup(popupHtml(selected)).openPopup();
          });
        }
      }).addTo(map);
      try { map.fitBounds(zipLayer.getBounds(), { padding: [20, 20] }); } catch(e) {}
      updateStats();
    }

    async function loadZipLayer(forceRefresh = false) {
      try {
        if (!forceRefresh) {
          const cached = await cacheGet("zipGeoJSONNorth");
          if (cached) await renderZipData(cached);
        }

        const res = await fetch(ZIP_URL, { cache: "no-store" });
        if (!res.ok) throw new Error("network failed");
        const data = await res.json();
        const filtered = filterNorth(data);
        await cachePut("zipGeoJSONNorth", filtered);
        await renderZipData(filtered);
      } catch (err) {
        const cached = await cacheGet("zipGeoJSONNorth");
        if (cached) {
          await renderZipData(cached);
        } else {
          document.getElementById("stats").innerHTML = "Could not load ZIP shapes yet. Open once with internet so the phone can save them.";
        }
      }
    }

    const panel = document.getElementById("panel");
    const menuBtn = document.getElementById("menuBtn");

    function openMenu() {
      panel.classList.add("open");
      menuBtn.classList.add("hidden");
    }

    function closeMenu() {
      panel.classList.remove("open");
      menuBtn.classList.remove("hidden");
    }

    menuBtn.addEventListener("click", openMenu);
    document.getElementById("closeBtn").addEventListener("click", closeMenu);

    document.getElementById("zipFill").value = state.settings.zipFill || "none";
    document.getElementById("zipWeight").value = state.settings.zipWeight || 3.5;

    document.getElementById("zipFill").addEventListener("change", (e) => {
      state.settings.zipFill = e.target.value;
      redrawZipLayer();
    });

    document.getElementById("zipWeight").addEventListener("input", (e) => {
      state.settings.zipWeight = Number(e.target.value);
      redrawZipLayer();
    });

    document.getElementById("refreshZipBtn").addEventListener("click", () => loadZipLayer(true));

    document.getElementById("markTodayBtn").addEventListener("click", () => {
      if (!selected) return;
      state.zips[selected] = new Date().toISOString().split("T")[0];
      redrawZipLayer();
    });

    document.getElementById("setDateBtn").addEventListener("click", () => {
      if (!selected) return;
      const d = document.getElementById("date").value;
      if (!d) return;
      state.zips[selected] = d;
      redrawZipLayer();
    });

    document.getElementById("clearDateBtn").addEventListener("click", () => {
      if (!selected) return;
      delete state.zips[selected];
      redrawZipLayer();
    });

    function findZip(query) {
      return String(query || "").trim().replace(/\D/g, "");
    }

    function zoomToZip(zip) {
      if (!zipLayer) return false;
      let found = false;
      zipLayer.eachLayer(layer => {
        const code = zipCodeFromFeature(layer.feature);
        if (code === zip) {
          found = true;
          selected = zip;
          redrawZipLayer();
          map.fitBounds(layer.getBounds(), { padding: [20, 20] });
          layer.bindPopup(popupHtml(zip)).openPopup();
        }
      });
      return found;
    }

    document.getElementById("searchBtn").addEventListener("click", () => {
      const zip = findZip(document.getElementById("searchInput").value);
      if (!zip || !zoomToZip(zip)) alert("No ZIP match found.");
    });

    document.getElementById("searchInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        const zip = findZip(e.target.value);
        if (!zip || !zoomToZip(zip)) alert("No ZIP match found.");
      }
    });

    updateStats();
    loadZipLayer(false);
  </script>
</body>
</html>
