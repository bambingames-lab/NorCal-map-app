<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Territory Manager</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html,body{
margin:0;
height:100%;
font-family:-apple-system,BlinkMacSystemFont;
background:#000;
}

#map{
position:absolute;
top:70px;
bottom:0;
left:0;
right:0;
}

.topbar{
position:absolute;
top:0;
left:0;
right:0;
height:70px;
background:#9cff00;
display:flex;
align-items:center;
padding:0 16px;
font-weight:700;
z-index:999;
}

.topbar .title{
flex:1;
font-size:20px;
}

button{
border:none;
padding:10px 14px;
border-radius:10px;
background:black;
color:#9cff00;
font-weight:700;
}

.popup-btn{
width:100%;
margin-top:6px;
background:#9cff00;
color:black;
}

.popup-secondary{
background:#e5f4c5;
color:black;
}

.popup-danger{
background:#ff5c5c;
color:white;
}
</style>
</head>
<body>

<div class="topbar">
<div class="title">Territory Manager</div>
<button onclick="openTeams()">Teams</button>
</div>

<div id="map"></div>

<script>

const map = L.map('map').setView([38.6,-121.3],8);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

const state={
areas:{},
teams:{
team1:"#2563eb",
team2:"#9333ea",
team3:"#ec4899",
team4:"#0f766e"
},
threshold:90
};

function mix(c1,c2,t){
const a=parseInt(c1.slice(1),16);
const b=parseInt(c2.slice(1),16);

const r1=(a>>16)&255;
const g1=(a>>8)&255;
const b1=a&255;

const r2=(b>>16)&255;
const g2=(b>>8)&255;
const b2=b&255;

const r=Math.round(r1+(r2-r1)*t);
const g=Math.round(g1+(g2-g1)*t);
const b3=Math.round(b1+(b2-b1)*t);

return "#" + ((1<<24)+(r<<16)+(g<<8)+b3).toString(16).slice(1);
}

function getColor(id){
const a=state.areas[id];
if(!a || !a.date) return "transparent";

const days=(Date.now()-new Date(a.date))/86400000;
const t=Math.min(days/state.threshold,1);

const start=state.teams[a.owner||"team1"];
const end=state.teams[a.handoff||"team2"];

return mix(start,end,t);
}

function popupHtml(id){
const a=state.areas[id]||{};

return `
<b>Area ${id}</b><br>
Last visited: ${a.date||"Not set"}

<button class="popup-btn" onclick="markToday('${id}')">Mark Today</button>

<select id="owner-${id}">
<option value="team1">Team 1</option>
<option value="team2">Team 2</option>
<option value="team3">Team 3</option>
<option value="team4">Team 4</option>
</select>

<select id="handoff-${id}">
<option value="team1">Team 1</option>
<option value="team2">Team 2</option>
<option value="team3">Team 3</option>
<option value="team4">Team 4</option>
</select>

<button class="popup-secondary" onclick="saveTeams('${id}')">
Apply Teams Gradient
</button>

<button class="popup-danger" onclick="clearDate('${id}')">
Clear
</button>
`;
}

function markToday(id){
state.areas[id]=state.areas[id]||{};
state.areas[id].date=new Date().toISOString().slice(0,10);
refresh();
}

function saveTeams(id){
state.areas[id]=state.areas[id]||{};
state.areas[id].owner=document.getElementById("owner-"+id).value;
state.areas[id].handoff=document.getElementById("handoff-"+id).value;
refresh();
}

function clearDate(id){
delete state.areas[id];
refresh();
}

const areas=[];

for(let i=0;i<20;i++){
const lat=38.5+(Math.random()*1.5);
const lng=-121.7+(Math.random()*1.5);

const poly=L.circle([lat,lng],{
radius:20000,
color:"#000",
weight:1,
fillOpacity:.7
}).addTo(map);

poly.id=i;

poly.on("click",()=>{
poly.bindPopup(popupHtml(i)).openPopup();
});

areas.push(poly);
}

function refresh(){
areas.forEach(p=>{
p.setStyle({
fillColor:getColor(p.id)
});
});
}

refresh();

</script>
</body>
</html>
