<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NorCal Territory Tracker</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { margin:0; font-family: Arial; }
#map { height:100vh; }

.panel{
  position:absolute;
  top:10px;
  left:10px;
  background:white;
  padding:12px;
  border-radius:12px;
  width:280px;
  z-index:1000;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

button, select, input{
  width:100%;
  margin-top:6px;
  padding:8px;
  border-radius:8px;
}

button{
  background:#2563eb;
  color:white;
  border:none;
}

.legend{
  display:flex;
  height:14px;
  margin-top:10px;
  border-radius:999px;
  overflow:hidden;
}

.legend div{flex:1;}
</style>
</head>

<body>

<div class="panel">
<b>ZIP Style</b>
<select id="zipFill">
<option value="none">Transparent</option>
<option value="gray">Light Gray</option>
</select>

<button onclick="markToday()">Mark City Today</button>

<input type="date" id="date">

<button onclick="setDate()">Set Date</button>

<input placeholder="Search city..." id="search">

<div class="legend">
<div style="background:#b91c1c"></div>
<div style="background:#ef4444"></div>
<div style="background:#facc15"></div>
<div style="background:#22c55e"></div>
</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([39.4,-121.6],7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let state = JSON.parse(localStorage.getItem("mapState")) || {};
let selected = null;

function getColor(date){
  if(!date) return "#e5e7eb";

  let weeks = (Date.now() - new Date(date)) / (1000*60*60*24*7);

  if(weeks < 2) return "#b91c1c";
  if(weeks < 5) return "#ef4444";
  if(weeks < 9) return "#facc15";
  return "#22c55e";
}

function zipStyle(){
  return {
    color:"#2563eb",
    weight:6,
    opacity:1,
    fillColor:"#94a3b8",
    fillOpacity: document.getElementById("zipFill").value=="gray"?0.15:0
  };
}

function cityStyle(feature){
  return {
    color:"#111",
    weight:2,
    fillColor:getColor(state[feature.properties.name]),
    fillOpacity:0.65
  };
}

fetch("https://raw.githubusercontent.com/OpenDataDE/State-zip-code-GeoJSON/master/ca_california_zip_codes_geo.min.json")
.then(r=>r.json())
.then(data=>{
  zips = L.geoJSON(data,{style:zipStyle}).addTo(map);
  zips.bringToFront();
});

fetch("https://raw.githubusercontent.com/codeforamerica/click_that_hood/master/public/data/california-cities.geojson")
.then(r=>r.json())
.then(data=>{
  cities = L.geoJSON(data,{
    style:cityStyle,
    onEachFeature:(f,l)=>{
      l.on("click",()=>{
        selected = f.properties.name;
        l.setStyle({weight:4,color:"#000"});
      });
    }
  }).addTo(map);
  cities.bringToFront();
});

function markToday(){
  if(!selected) return;
  state[selected] = new Date().toISOString().split("T")[0];
  save();
}

function setDate(){
  if(!selected) return;
  state[selected] = document.getElementById("date").value;
  save();
}

function save(){
  localStorage.setItem("mapState", JSON.stringify(state));
  location.reload();
}

document.getElementById("zipFill").onchange=()=>{
  zips.setStyle(zipStyle);
};

document.getElementById("search").oninput=e=>{
  let val=e.target.value.toLowerCase();
  cities.eachLayer(l=>{
    if(l.feature.properties.name.toLowerCase().includes(val)){
      map.fitBounds(l.getBounds());
    }
  });
};
</script>

</body>
</html>
