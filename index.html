<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NorCal Territory Tracker</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  body { margin:0; font-family: Arial, sans-serif; }
  #map { height:100vh; width:100%; }

  .panel{
    position:absolute;
    top:10px;
    left:10px;
    background:white;
    padding:12px;
    border-radius:12px;
    width:300px;
    z-index:1000;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
  }

  button, select, input, textarea{
    width:100%;
    margin-top:6px;
    padding:8px;
    border-radius:8px;
    box-sizing:border-box;
    font-size:14px;
  }

  button{
    background:#2563eb;
    color:white;
    border:none;
    font-weight:700;
  }

  .legend{
    display:flex;
    height:14px;
    margin-top:10px;
    border-radius:999px;
    overflow:hidden;
  }
  .legend div{flex:1;}

  .small{
    font-size:12px;
    color:#666;
    margin-top:8px;
    line-height:1.35;
  }

  .info{
    margin-top:8px;
    background:#eff6ff;
    border:1px solid #dbeafe;
    border-radius:10px;
    padding:8px;
    font-size:13px;
    line-height:1.35;
  }

  .leaflet-tooltip.zip-label{
    background: rgba(255,255,255,0.94);
    border: 1px solid rgba(17,24,39,0.18);
    box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    color:#111827;
    font-size:11px;
    font-weight:700;
    padding:4px 6px;
  }

  .leaflet-tooltip.city-label{
    background: rgba(255,255,255,0.94);
    border: 1px solid rgba(37,99,235,0.22);
    box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    color:#111827;
    font-size:11px;
    font-weight:700;
    padding:4px 6px;
  }
</style>
</head>
<body>
<div class="panel">
  <div><strong>NorCal Territory Tracker</strong></div>

  <label style="display:block;margin-top:10px;font-weight:700;">ZIP fill</label>
  <select id="zipFill">
    <option value="none">Transparent</option>
    <option value="gray">Light Gray</option>
  </select>

  <button id="markTodayBtn" type="button">Mark City Today</button>
  <input type="date" id="date">
  <button id="setDateBtn" type="button">Set Date</button>

  <input placeholder="Search city or ZIP..." id="search">

  <div class="legend">
    <div style="background:#b91c1c"></div>
    <div style="background:#ef4444"></div>
    <div style="background:#f97316"></div>
    <div style="background:#facc15"></div>
    <div style="background:#86efac"></div>
  </div>
  <div class="small">Recent = red. About 3 months out = green.</div>

  <div id="selectionInfo" class="info">Tap a city to edit it.</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
<script>
const ANGELS_CAMP_LAT = 38.0683;
const ZIP_URL = "https://services.arcgis.com/P3ePLMYs2RVChkJx/arcgis/rest/services/ZIP_Codes/FeatureServer/0/query?where=1%3D1&outFields=*&outSR=4326&f=geojson";
const CITY_URL = "https://services.arcgis.com/P3ePLMYs2RVChkJx/arcgis/rest/services/California_Cities/FeatureServer/0/query?where=1%3D1&outFields=*&outSR=4326&f=geojson";

const map = L.map('map').setView([39.4, -121.6], 7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

let state = JSON.parse(localStorage.getItem("mapState")) || {};
let selectedCityName = null;
let zips, cities;
let zipFeatures = [];
let cityFeatures = [];

function saveState(){
  localStorage.setItem("mapState", JSON.stringify(state));
}

function weeks(d){
  return (Date.now() - new Date(d)) / (1000*60*60*24*7);
}

function color(date){
  if(!date) return "#d1d5db";
  const w = weeks(date);
  if(w < 2) return "#b91c1c";
  if(w < 5) return "#ef4444";
  if(w < 8) return "#f97316";
  if(w < 11) return "#facc15";
  return "#86efac";
}

function zipWeightForZoom(){
  const z = map.getZoom();
  if (z <= 6) return 1.1;
  if (z <= 7) return 1.6;
  if (z <= 8) return 2.1;
  if (z <= 9) return 2.8;
  return 3.8;
}

function zipStyle(){
  return {
    color:"#111827",
    weight: zipWeightForZoom(),
    opacity: 0.92,
    fillColor: document.getElementById("zipFill").value === "gray" ? "#d1d5db" : "transparent",
    fillOpacity: document.getElementById("zipFill").value === "gray" ? 0.14 : 0
  };
}

function cityStyle(feature){
  const name = feature.properties.NAME || feature.properties.name || "Unknown";
  const active = selectedCityName === name;
  return {
    fillColor: active ? "#22c55e" : color(state[name]?.date),
    fillOpacity: active ? 0.9 : 0.72,
    color: "#ffffff",
    weight: active ? 2.8 : 1.2,
    opacity: 1
  };
}

function updateSelectionInfo(){
  const box = document.getElementById("selectionInfo");
  if(!selectedCityName){
    box.innerHTML = "Tap a city to edit it.";
    return;
  }
  const rec = state[selectedCityName] || {};
  box.innerHTML = "<strong>" + selectedCityName + "</strong><br>Last checked: " + (rec.date || "Not set");
}

function resetCityStyles(){
  if (!cities) return;
  cities.setStyle(cityStyle);
}

function refreshZipStyles(){
  if (zips) zips.setStyle(zipStyle);
}

function refreshZipLabels(){
  if (!zips) return;
  const show = map.getZoom() >= 9;
  zips.eachLayer(layer => {
    if (show) {
      try { layer.openTooltip(); } catch(e) {}
    } else {
      try { layer.closeTooltip(); } catch(e) {}
    }
  });
}

function refreshCityLabels(){
  if (!cities) return;
  const show = map.getZoom() >= 10;
  cities.eachLayer(layer => {
    if (show) {
      try { layer.openTooltip(); } catch(e) {}
    } else {
      try { layer.closeTooltip(); } catch(e) {}
    }
  });
}

function cityName(feature){
  return feature.properties.NAME || feature.properties.name || "Unknown";
}

function featureNorthOfAngelsCamp(feature){
  try{
    const center = turf.center(feature);
    return center.geometry.coordinates[1] >= ANGELS_CAMP_LAT;
  } catch(e){
    return true;
  }
}

function approximateLargestTownByZip(zipFeature, cityFeatureList){
  let best = null;
  let bestArea = -1;

  for(const city of cityFeatureList){
    try{
      const center = turf.centerOfMass(city);
      if (turf.booleanPointInPolygon(center, zipFeature)) {
        const a = turf.area(city);
        if (a > bestArea) {
          bestArea = a;
          best = cityName(city);
        }
      }
    }catch(e){}
  }
  return best;
}

function bindZipLabels(){
  if (!zips) return;
  zips.eachLayer(layer => {
    const props = layer.feature.properties || {};
    const zip = props.ZCTA5CE20 || props.ZIP || props.NAME || "ZIP";
    const biggestTown = approximateLargestTownByZip(layer.feature, cityFeatures);
    const label = biggestTown ? (zip + " - " + biggestTown) : String(zip);
    layer.bindTooltip(label, {
      permanent: true,
      direction: "center",
      className: "zip-label"
    });
  });
  refreshZipLabels();
}

async function loadData(){
  const [zipResp, cityResp] = await Promise.all([
    fetch(ZIP_URL),
    fetch(CITY_URL)
  ]);

  const zipData = await zipResp.json();
  const cityData = await cityResp.json();

  zipFeatures = (zipData.features || []).filter(featureNorthOfAngelsCamp);
  cityFeatures = (cityData.features || []).filter(featureNorthOfAngelsCamp);

  zips = L.geoJSON({type:"FeatureCollection", features: zipFeatures}, {
    style: zipStyle,
    onEachFeature: (feature, layer) => {
      const props = feature.properties || {};
      const zip = props.ZCTA5CE20 || props.ZIP || props.NAME || "ZIP";
      layer.on("click", () => {
        const biggestTown = approximateLargestTownByZip(feature, cityFeatures);
        const text = biggestTown ? "<strong>ZIP " + zip + "</strong><br>Largest town shown: " + biggestTown : "<strong>ZIP " + zip + "</strong>";
        layer.bindPopup(text).openPopup();
      });
    }
  }).addTo(map);

  cities = L.geoJSON({type:"FeatureCollection", features: cityFeatures}, {
    style: cityStyle,
    onEachFeature: (feature, layer) => {
      const name = cityName(feature);
      layer.bindTooltip(name, {
        permanent: true,
        direction: "center",
        className: "city-label"
      });

      layer.on("click", () => {
        selectedCityName = name;
        resetCityStyles();
        updateSelectionInfo();
      });

      layer.on("mouseover", () => {
        if (selectedCityName !== name) {
          layer.setStyle({
            fillOpacity: 0.85,
            weight: 2.0
          });
        }
      });

      layer.on("mouseout", () => {
        if (selectedCityName !== name) resetCityStyles();
      });
    }
  }).addTo(map);

  cities.bringToFront();
  bindZipLabels();
  refreshCityLabels();

  const all = L.featureGroup([zips, cities]);
  map.fitBounds(all.getBounds(), {padding:[20,20]});
}

document.getElementById("markTodayBtn").addEventListener("click", () => {
  if(!selectedCityName) return;
  state[selectedCityName] = state[selectedCityName] || {};
  state[selectedCityName].date = new Date().toISOString().split("T")[0];
  saveState();
  resetCityStyles();
  updateSelectionInfo();
});

document.getElementById("setDateBtn").addEventListener("click", () => {
  if(!selectedCityName) return;
  const date = document.getElementById("date").value;
  if (!date) return;
  state[selectedCityName] = state[selectedCityName] || {};
  state[selectedCityName].date = date;
  saveState();
  resetCityStyles();
  updateSelectionInfo();
});

document.getElementById("zipFill").addEventListener("change", refreshZipStyles);

document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value.toLowerCase().trim();
  if (!val || !cities || !zips) return;

  let found = false;
  cities.eachLayer(l => {
    const nm = cityName(l.feature).toLowerCase();
    if (!found && nm.includes(val)) {
      found = true;
      selectedCityName = cityName(l.feature);
      resetCityStyles();
      map.fitBounds(l.getBounds(), {padding:[20,20]});
      updateSelectionInfo();
    }
  });

  if (found) return;

  zips.eachLayer(l => {
    const props = l.feature.properties || {};
    const zip = String(props.ZCTA5CE20 || props.ZIP || props.NAME || "").toLowerCase();
    if (!found && zip.includes(val)) {
      found = true;
      map.fitBounds(l.getBounds(), {padding:[20,20]});
      l.openPopup();
    }
  });
});

map.on("zoomend", () => {
  refreshZipStyles();
  refreshZipLabels();
  refreshCityLabels();
});

loadData().catch(err => {
  console.error(err);
  alert("Could not load live map data.");
});
</script>
</body>
</html>
