<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Territory Manager</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont;}
#map{position:absolute;top:70px;bottom:0;left:0;right:0;}
.top{position:absolute;top:0;left:0;right:0;height:70px;background:#9cff00;
display:flex;align-items:center;padding:0 16px;font-weight:700;z-index:999;}
.btn{background:black;color:#9cff00;border:none;padding:10px 14px;border-radius:10px;}
.popup button{width:100%;margin-top:6px}
</style>
</head>
<body>

<div class="top">
<div style="flex:1">Territory Manager</div>
<button class="btn">Teams</button>
</div>

<div id="map"></div>

<script>
const map=L.map('map').setView([38.6,-121.3],8);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

const state={areas:{},teams:{
team1:"#2563eb",
team2:"#9333ea",
team3:"#ec4899",
team4:"#0f766e"
},threshold:90};

function mix(a,b,t){
const A=parseInt(a.slice(1),16);
const B=parseInt(b.slice(1),16);
const r1=(A>>16)&255,g1=(A>>8)&255,b1=A&255;
const r2=(B>>16)&255,g2=(B>>8)&255,b2=B&255;
const r=Math.round(r1+(r2-r1)*t);
const g=Math.round(g1+(g2-g1)*t);
const bb=Math.round(b1+(b2-b1)*t);
return "#"+((1<<24)+(r<<16)+(g<<8)+bb).toString(16).slice(1);
}

function color(id){
const a=state.areas[id];
if(!a||!a.date) return "transparent";
const days=(Date.now()-new Date(a.date))/86400000;
const t=Math.min(days/state.threshold,1);
return mix(state.teams[a.owner||"team1"],state.teams[a.handoff||"team2"],t);
}

function popup(id){
const a=state.areas[id]||{};
return `
<div class="popup">
<b>Area ${id}</b><br>
Last visited: ${a.date||"Not set"}

<button onclick="today('${id}')">Mark Today</button>

<label>Owner Team</label>
<select id="o${id}">
<option>team1</option>
<option>team2</option>
<option>team3</option>
<option>team4</option>
</select>

<label>Handoff Team</label>
<select id="h${id}">
<option>team1</option>
<option>team2</option>
<option>team3</option>
<option>team4</option>
</select>

<button onclick="save('${id}')">Apply Teams Gradient</button>
<button onclick="clearArea('${id}')">Clear</button>
</div>`;
}

function today(id){
state.areas[id]=state.areas[id]||{};
state.areas[id].date=new Date().toISOString().slice(0,10);
refresh();
}

function save(id){
state.areas[id]=state.areas[id]||{};
state.areas[id].owner=document.getElementById("o"+id).value;
state.areas[id].handoff=document.getElementById("h"+id).value;
refresh();
}

function clearArea(id){delete state.areas[id];refresh();}

const polys=[];

for(let i=0;i<15;i++){
const p=L.circle([38+Math.random()*2,-122+Math.random()*2],{
radius:15000,color:"#000",weight:1,fillOpacity:.7
}).addTo(map);

p.id=i;
p.on("click",()=>p.bindPopup(popup(i)).openPopup());
polys.push(p);
}

function refresh(){
polys.forEach(p=>p.setStyle({fillColor:color(p.id)}));
}
refresh();
</script>

</body>
</html>
